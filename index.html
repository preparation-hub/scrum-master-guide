<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Personal interview preparation hub — track companies, rounds, dates, questions and outcomes.">
<title>Interview Prep Hub</title>
<style>
  :root {
    --paper: #eef1ef; --surface: #ffffff; --surface-2: #f6f8f6;
    --ink: #16262b; --ink-soft: #43565a; --muted: #77878a;
    --line: #dde3e0; --line-soft: #e8ece9;
    --accent: #ff5c39; --accent-ink: #c8391a;
    --teal: #0e7c7b; --teal-soft: #d8eae9;
    --amber: #c47d15; --amber-bg: #fbf1dc;
    --good: #2f8f63; --good-bg: #e3f2ea;
    --danger: #c8391a; --danger-bg: #fbe6e0;
    --shadow: 0 1px 2px rgba(22,38,43,.06), 0 8px 24px rgba(22,38,43,.06);
    --shadow-lg: 0 2px 6px rgba(22,38,43,.08), 0 24px 60px rgba(22,38,43,.12);
    --font-display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
    --font-body: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "Consolas", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0d1416; --surface: #15201f; --surface-2: #1a2624;
      --ink: #eef3f0; --ink-soft: #bcc9c5; --muted: #839290;
      --line: #26312f; --line-soft: #202b29;
      --accent: #ff6f4d; --accent-ink: #ff8b70;
      --teal: #37b3b0; --teal-soft: #14312f;
      --amber: #e6b45c; --amber-bg: #2a2416;
      --good: #4bbd83; --good-bg: #14281f;
      --danger: #ff7a5c; --danger-bg: #2c1712;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
      --shadow-lg: 0 2px 6px rgba(0,0,0,.5), 0 24px 60px rgba(0,0,0,.5);
    }
  }
  :root[data-theme="dark"] {
    --paper: #0d1416; --surface: #15201f; --surface-2: #1a2624;
    --ink: #eef3f0; --ink-soft: #bcc9c5; --muted: #839290;
    --line: #26312f; --line-soft: #202b29;
    --accent: #ff6f4d; --accent-ink: #ff8b70;
    --teal: #37b3b0; --teal-soft: #14312f;
    --amber: #e6b45c; --amber-bg: #2a2416;
    --good: #4bbd83; --good-bg: #14281f;
    --danger: #ff7a5c; --danger-bg: #2c1712;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    --shadow-lg: 0 2px 6px rgba(0,0,0,.5), 0 24px 60px rgba(0,0,0,.5);
  }
  :root[data-theme="light"] {
    --paper: #eef1ef; --surface: #ffffff; --surface-2: #f6f8f6;
    --ink: #16262b; --ink-soft: #43565a; --muted: #77878a;
    --line: #dde3e0; --line-soft: #e8ece9;
    --accent: #ff5c39; --accent-ink: #c8391a;
    --teal: #0e7c7b; --teal-soft: #d8eae9;
    --amber: #c47d15; --amber-bg: #fbf1dc;
    --good: #2f8f63; --good-bg: #e3f2ea;
    --danger: #c8391a; --danger-bg: #fbe6e0;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--font-body); font-size: 16px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent-ink); }

  /* topbar */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: saturate(1.4) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    max-width: 1120px; margin: 0 auto; padding: 11px 22px;
    display: flex; align-items: center; gap: 14px;
  }
  .brand {
    font-family: var(--font-display); font-weight: 600; font-size: 19px;
    letter-spacing: -0.01em; text-decoration: none; color: var(--ink);
    display: flex; align-items: center; gap: 9px; white-space: nowrap;
  }
  .brand .dot { width: 11px; height: 11px; border-radius: 3px; background: var(--accent); transform: rotate(45deg); }
  .spacer { flex: 1; }
  .nav-actions { display: flex; align-items: center; gap: 8px; }

  .btn {
    font-family: var(--font-body); font-size: 13.5px; font-weight: 550;
    color: var(--ink); background: var(--surface); border: 1px solid var(--line);
    border-radius: 9px; padding: 7px 12px; cursor: pointer; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
    transition: background .15s, border-color .15s, transform .05s;
  }
  .btn:hover { background: var(--surface-2); border-color: var(--muted); }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  :root[data-theme="dark"] .btn-primary { color: #0d1416; }
  .btn-primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-2); border-color: transparent; }
  .btn-sm { font-size: 12.5px; padding: 5px 9px; border-radius: 8px; }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }
  .icon { width: 15px; height: 15px; display: inline-block; vertical-align: -2px; }

  /* dropdown */
  .dropdown { position: relative; }
  .menu {
    position: absolute; top: calc(100% + 8px); right: 0; min-width: 260px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 13px;
    box-shadow: var(--shadow-lg); padding: 8px; display: none; z-index: 200;
    max-height: 70vh; overflow-y: auto;
  }
  .menu.open { display: block; }
  .menu-company { padding: 8px 10px 4px; }
  .menu-company .mc-name {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 3px;
  }
  .menu a.menu-round {
    display: flex; justify-content: space-between; gap: 12px; align-items: center;
    padding: 7px 10px; border-radius: 8px; text-decoration: none; color: var(--ink);
    font-size: 13.5px;
  }
  .menu a.menu-round:hover { background: var(--surface-2); }
  .menu-sep { height: 1px; background: var(--line-soft); margin: 6px 4px; }
  .menu-empty { padding: 10px; color: var(--muted); font-size: 13px; }

  /* layout */
  main { max-width: 1120px; margin: 0 auto; padding: 30px 22px 90px; }

  .page-head { margin-bottom: 22px; }
  .eyebrow {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--accent-ink); margin: 0 0 10px;
  }
  h1.title {
    font-family: var(--font-display); font-weight: 600;
    font-size: clamp(28px, 5vw, 42px); line-height: 1.08; letter-spacing: -0.015em;
    margin: 0 0 10px; text-wrap: balance;
  }
  .subtitle { color: var(--ink-soft); margin: 0; max-width: 60ch; }

  /* stat row */
  .stats { display: flex; flex-wrap: wrap; gap: 12px; margin: 22px 0 26px; }
  .stat {
    background: var(--surface); border: 1px solid var(--line); border-radius: 13px;
    padding: 13px 18px; box-shadow: var(--shadow); min-width: 120px;
  }
  .stat .n { font-family: var(--font-display); font-size: 26px; font-weight: 600; line-height: 1; }
  .stat .l { font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

  .section-bar { display: flex; align-items: center; gap: 12px; margin: 8px 0 16px; }
  .section-bar h2 {
    font-family: var(--font-display); font-weight: 600; font-size: 21px; margin: 0;
  }
  .section-bar .line { flex: 1; height: 1px; background: var(--line); }

  /* cards grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column;
  }
  .card-top { padding: 18px 18px 14px; }
  .card-head { display: flex; align-items: flex-start; gap: 12px; }
  .avatar {
    flex: none; width: 44px; height: 44px; border-radius: 12px;
    display: grid; place-items: center; font-family: var(--font-display);
    font-weight: 600; font-size: 19px; color: #fff;
  }
  .card h3 {
    font-family: var(--font-display); font-weight: 600; font-size: 20px;
    margin: 0; line-height: 1.15; letter-spacing: -0.01em; word-break: break-word;
  }
  .card .role { color: var(--ink-soft); font-size: 13.5px; margin-top: 2px; }
  .card-meta {
    display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 14px;
    font-size: 12.5px; color: var(--muted); font-family: var(--font-mono);
  }
  .card-meta b { color: var(--ink); font-weight: 600; }

  .rounds-toggle {
    width: 100%; border: none; border-top: 1px solid var(--line-soft);
    background: var(--surface-2); color: var(--ink); cursor: pointer;
    padding: 11px 18px; font-family: var(--font-body); font-size: 13.5px; font-weight: 550;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .rounds-toggle:hover { background: color-mix(in srgb, var(--teal) 8%, var(--surface-2)); }
  .rounds-toggle .chev { transition: transform .2s; }
  .rounds-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
  .rounds { display: none; padding: 6px 12px 12px; border-top: 1px solid var(--line-soft); }
  .rounds.open { display: block; }
  .round-row {
    display: flex; align-items: center; gap: 10px; padding: 9px 8px;
    border-radius: 9px; text-decoration: none; color: var(--ink);
  }
  .round-row:hover { background: var(--surface-2); }
  .round-row .rr-name { font-weight: 550; font-size: 14px; }
  .round-row .rr-date { font-family: var(--font-mono); font-size: 12px; color: var(--muted); margin-left: auto; }
  .add-round {
    width: 100%; text-align: left; margin-top: 4px; border: 1px dashed var(--line);
    background: transparent; color: var(--muted); border-radius: 9px; padding: 8px 10px;
    cursor: pointer; font-family: var(--font-body); font-size: 13px;
  }
  .add-round:hover { color: var(--teal); border-color: var(--teal); }
  .card-actions { display: flex; gap: 6px; margin-left: auto; }

  /* pills */
  .pill {
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .05em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 999px; font-weight: 600;
    white-space: nowrap; border: 1px solid transparent;
  }
  .pill.scheduled { background: var(--teal-soft); color: var(--teal); }
  .pill.cleared   { background: var(--good-bg); color: var(--good); }
  .pill.rejected  { background: var(--danger-bg); color: var(--danger); }
  .pill.awaiting  { background: var(--amber-bg); color: var(--amber); }
  .pill.withdrawn { background: var(--surface-2); color: var(--muted); border-color: var(--line); }
  .pill.none      { background: var(--surface-2); color: var(--muted); border-color: var(--line); }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
    border: 1px dashed var(--line); border-radius: 16px; background: var(--surface);
  }
  .empty-state h3 { font-family: var(--font-display); color: var(--ink); margin: 0 0 8px; font-size: 22px; }

  /* round detail */
  .breadcrumb { font-family: var(--font-mono); font-size: 12.5px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .breadcrumb a { color: var(--muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent-ink); }

  .detail-head { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
  .detail-head .avatar { width: 52px; height: 52px; font-size: 22px; border-radius: 14px; }
  .detail-head h1 { font-family: var(--font-display); font-weight: 600; font-size: clamp(24px, 4vw, 34px); margin: 0; letter-spacing: -0.01em; }
  .detail-head .dh-sub { color: var(--ink-soft); font-size: 14px; margin-top: 2px; }
  .detail-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .save-ind { font-family: var(--font-mono); font-size: 11.5px; color: var(--good); opacity: 0; transition: opacity .3s; }
  .save-ind.show { opacity: 1; }

  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin: 20px 0; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted); font-weight: 600;
  }
  .field input, .field select, .field textarea {
    font-family: var(--font-body); font-size: 15px; color: var(--ink);
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; width: 100%; resize: vertical;
  }
  .field textarea { min-height: 90px; line-height: 1.55; }
  .field textarea.tall { min-height: 150px; }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px color-mix(in srgb, var(--teal) 22%, transparent);
  }
  .field .hint { font-size: 12px; color: var(--muted); }

  .panel {
    background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow); padding: 22px 24px; margin-top: 18px;
  }
  .panel h2 { font-family: var(--font-display); font-weight: 600; font-size: 19px; margin: 0 0 4px; }
  .panel .panel-sub { color: var(--muted); font-size: 13px; margin: 0 0 4px; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
  @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; transition: none !important; } }

  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--paper); padding: 11px 18px; border-radius: 11px;
    font-size: 13.5px; box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; z-index: 500;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 560px) {
    .brand span.brand-text { display: none; }
    .nav-actions .label { display: none; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="#/"><span class="dot"></span><span class="brand-text">Interview Prep Hub</span></a>
    <div class="spacer"></div>
    <div class="nav-actions">
      <div class="dropdown">
        <button class="btn" id="companiesBtn" aria-haspopup="true" aria-expanded="false">
          Companies
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="menu" id="companiesMenu" role="menu"></div>
      </div>
      <a class="btn" href="scrum-guide.html">📘 <span class="label">Scrum Guide</span></a>
      <button class="btn btn-ghost btn-sm" id="exportBtn" title="Export all data as a backup file">⬇ <span class="label">Export</span></button>
      <button class="btn btn-ghost btn-sm" id="importBtn" title="Import a backup file">⬆ <span class="label">Import</span></button>
      <button class="btn btn-ghost btn-sm" id="themeBtn" title="Toggle light / dark">◐</button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </div>
  </div>
</header>

<main id="app"></main>
<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";
  var STORE_KEY = "iph.v1";
  var AVATAR_COLORS = ["#0e7c7b","#ff5c39","#c47d15","#2f8f63","#5b5bd6","#b3357e","#2b7fb3","#8a6d1f"];
  var OUTCOMES = ["Not set","Scheduled","Awaiting result","Cleared","Rejected","Withdrawn"];
  var OUTCOME_CLASS = { "Not set":"none","Scheduled":"scheduled","Awaiting result":"awaiting","Cleared":"cleared","Rejected":"rejected","Withdrawn":"withdrawn" };

  // ---------- model ----------
  function uid(prefix) { return (prefix||"id") + "-" + Date.now().toString(36) + "-" + Math.floor(Math.random()*1e6).toString(36); }

  function seed() {
    return {
      version: 1,
      companies: [
        { id: uid("c"), name: "EY", role: "", color: AVATAR_COLORS[0], rounds: [ newRound("Round 1 (L1)") ]},
        { id: uid("c"), name: "Zemoso", role: "", color: AVATAR_COLORS[1], rounds: [ newRound("Round 1 (L1)") ]}
      ]
    };
  }
  function newRound(name) {
    return { id: uid("r"), name: name || "Round 1", date: "", mode: "", interviewer: "",
             duration: "", questions: "", answers: "", revise: "", notes: "", outcome: "Not set" };
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (!raw) { var s = seed(); save(s); return s; }
      var m = JSON.parse(raw);
      if (!m || !Array.isArray(m.companies)) { var s2 = seed(); save(s2); return s2; }
      return m;
    } catch (e) { var s3 = seed(); save(s3); return s3; }
  }
  function save(m) { try { localStorage.setItem(STORE_KEY, JSON.stringify(m)); } catch (e) { toast("Could not save — storage may be full or blocked."); } }

  var model = load();
  function findCompany(cid) { return model.companies.filter(function(c){ return c.id === cid; })[0]; }
  function findRound(c, rid) { return c ? c.rounds.filter(function(r){ return r.id === rid; })[0] : null; }

  // ---------- helpers ----------
  function esc(s) { return String(s==null?"":s).replace(/[&<>"']/g, function(ch){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]; }); }
  function initials(name) {
    var parts = String(name||"?").trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return "?";
    if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  }
  function fmtDate(d) {
    if (!d) return "—";
    var dt = new Date(d + "T00:00:00");
    if (isNaN(dt)) return d;
    return dt.toLocaleDateString(undefined, { day:"numeric", month:"short", year:"numeric" });
  }
  function nextDate(c) {
    var dates = c.rounds.map(function(r){ return r.date; }).filter(Boolean).sort();
    var today = new Date().toISOString().slice(0,10);
    var upcoming = dates.filter(function(d){ return d >= today; });
    return upcoming.length ? upcoming[0] : (dates.length ? dates[dates.length-1] : "");
  }
  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toast._t); toast._t = setTimeout(function(){ t.classList.remove("show"); }, 2200);
  }

  // ---------- routing ----------
  function parseHash() {
    var h = location.hash.replace(/^#/, "");
    var m1 = h.match(/^\/c\/([^\/]+)\/r\/([^\/]+)$/);
    if (m1) return { view: "round", cid: m1[1], rid: m1[2] };
    return { view: "home" };
  }
  function go(hash) { location.hash = hash; }
  window.addEventListener("hashchange", render);

  // ---------- render ----------
  function render() {
    closeMenu();
    buildMenu();
    var route = parseHash();
    if (route.view === "round") return renderRound(route.cid, route.rid);
    renderHome();
    window.scrollTo(0, 0);
  }

  function renderHome() {
    var app = document.getElementById("app");
    var totalRounds = 0, upcoming = 0, cleared = 0;
    var today = new Date().toISOString().slice(0,10);
    model.companies.forEach(function(c){
      totalRounds += c.rounds.length;
      c.rounds.forEach(function(r){
        if (r.date && r.date >= today && (r.outcome==="Scheduled"||r.outcome==="Not set"||!r.outcome)) upcoming++;
        if (r.outcome === "Cleared") cleared++;
      });
    });

    var html = ''
      + '<div class="page-head">'
      +   '<p class="eyebrow">Personal Tracker</p>'
      +   '<h1 class="title">Interview Prep Hub</h1>'
      +   '<p class="subtitle">Every company, every round — dates, questions asked, your answers, and outcomes. Type anywhere; it saves automatically in this browser.</p>'
      + '</div>'
      + '<div class="stats">'
      +   stat(model.companies.length, "Companies")
      +   stat(totalRounds, "Total rounds")
      +   stat(upcoming, "Upcoming")
      +   stat(cleared, "Cleared")
      + '</div>'
      + '<div class="section-bar"><h2>Companies</h2><div class="line"></div>'
      +   '<button class="btn btn-primary btn-sm" id="addCompanyBtn">＋ Add company</button>'
      + '</div>';

    if (!model.companies.length) {
      html += '<div class="empty-state"><h3>No companies yet</h3><p>Add your first company to start tracking rounds, dates and questions.</p></div>';
    } else {
      html += '<div class="grid">' + model.companies.map(cardHTML).join("") + '</div>';
    }
    app.innerHTML = html;

    var addBtn = document.getElementById("addCompanyBtn");
    if (addBtn) addBtn.addEventListener("click", addCompany);
    app.querySelectorAll("[data-toggle-rounds]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var wrap = btn.parentNode.querySelector(".rounds");
        var open = wrap.classList.toggle("open");
        btn.setAttribute("aria-expanded", open ? "true" : "false");
        btn.querySelector("span").textContent = open ? "Hide rounds" : "View rounds";
      });
    });
    app.querySelectorAll("[data-add-round]").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); addRound(btn.getAttribute("data-add-round")); });
    });
    app.querySelectorAll("[data-del-company]").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); delCompany(btn.getAttribute("data-del-company")); });
    });
    app.querySelectorAll("[data-edit-company]").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); editCompany(btn.getAttribute("data-edit-company")); });
    });
  }

  function stat(n, l) { return '<div class="stat"><div class="n">' + n + '</div><div class="l">' + esc(l) + '</div></div>'; }

  function cardHTML(c) {
    var roundsHTML = c.rounds.map(function(r){
      var cls = OUTCOME_CLASS[r.outcome] || "none";
      return '<a class="round-row" href="#/c/' + c.id + '/r/' + r.id + '">'
        + '<span class="rr-name">' + esc(r.name) + '</span>'
        + '<span class="pill ' + cls + '">' + esc(r.outcome === "Not set" ? "—" : r.outcome) + '</span>'
        + '<span class="rr-date">' + fmtDate(r.date) + '</span>'
        + '</a>';
    }).join("");
    return ''
      + '<div class="card">'
      +   '<div class="card-top">'
      +     '<div class="card-head">'
      +       '<div class="avatar" style="background:' + esc(c.color || AVATAR_COLORS[0]) + '">' + esc(initials(c.name)) + '</div>'
      +       '<div style="min-width:0"><h3>' + esc(c.name) + '</h3><div class="role">' + esc(c.role || "Role not set") + '</div></div>'
      +       '<div class="card-actions">'
      +         '<button class="btn btn-ghost btn-sm" data-edit-company="' + c.id + '" title="Edit company">✎</button>'
      +         '<button class="btn btn-ghost btn-sm btn-danger" data-del-company="' + c.id + '" title="Delete company">🗑</button>'
      +       '</div>'
      +     '</div>'
      +     '<div class="card-meta">'
      +       '<span><b>' + c.rounds.length + '</b> round' + (c.rounds.length===1?'':'s') + '</span>'
      +       '<span>Next: <b>' + fmtDate(nextDate(c)) + '</b></span>'
      +     '</div>'
      +   '</div>'
      +   '<button class="rounds-toggle" data-toggle-rounds aria-expanded="false">'
      +     '<span>View rounds</span>'
      +     '<svg class="icon chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9l6 6 6-6"/></svg>'
      +   '</button>'
      +   '<div class="rounds">'
      +     roundsHTML
      +     '<button class="add-round" data-add-round="' + c.id + '">＋ Add round</button>'
      +   '</div>'
      + '</div>';
  }

  function renderRound(cid, rid) {
    var c = findCompany(cid); var r = findRound(c, rid);
    if (!c || !r) { go("#/"); return; }
    var app = document.getElementById("app");
    app.innerHTML = ''
      + '<div class="breadcrumb"><a href="#/">Hub</a> <span>›</span> <span>' + esc(c.name) + '</span> <span>›</span> <span style="color:var(--ink)">' + esc(r.name) + '</span></div>'
      + '<div class="detail-head">'
      +   '<div class="avatar" style="background:' + esc(c.color || AVATAR_COLORS[0]) + '">' + esc(initials(c.name)) + '</div>'
      +   '<div style="min-width:0"><h1>' + esc(c.name) + '</h1><div class="dh-sub">' + esc(r.name) + (c.role ? ' · ' + esc(c.role) : '') + '</div></div>'
      +   '<div class="detail-actions">'
      +     '<span class="save-ind" id="saveInd">✓ Saved</span>'
      +     '<button class="btn btn-ghost btn-sm" id="copyBtn" title="Copy this round as text">⧉ Copy</button>'
      +     '<button class="btn btn-ghost btn-sm btn-danger" id="delRoundBtn">🗑 Delete round</button>'
      +   '</div>'
      + '</div>'
      + '<div class="panel">'
      +   '<h2>Round details</h2>'
      +   '<div class="form-grid">'
      +     fieldInput("Round name", "name", r.name, "text")
      +     fieldInput("Date", "date", r.date, "date")
      +     fieldInput("Mode", "mode", r.mode, "text", "Virtual / Onsite / Phone")
      +     fieldInput("Duration", "duration", r.duration, "text", "e.g. 45 min")
      +     fieldInput("Interviewer(s)", "interviewer", r.interviewer, "text", "Name / title")
      +     fieldSelect("Outcome", "outcome", r.outcome)
      +   '</div>'
      + '</div>'
      + '<div class="panel"><h2>Questions asked</h2><p class="panel-sub">Jot down every question they asked — one per line works well.</p>' + fieldArea("questions", r.questions, "tall") + '</div>'
      + '<div class="panel"><h2>My answers &amp; how it went</h2><p class="panel-sub">What you said, what landed, what you fumbled.</p>' + fieldArea("answers", r.answers, "tall") + '</div>'
      + '<div class="panel"><h2>Topics to revise</h2><p class="panel-sub">Gaps to close before the next round.</p>' + fieldArea("revise", r.revise) + '</div>'
      + '<div class="panel"><h2>Notes</h2><p class="panel-sub">Anything else — vibe, next steps, feedback, dates promised.</p>' + fieldArea("notes", r.notes) + '</div>';

    app.querySelectorAll("[data-field]").forEach(function(el){
      var evt = (el.tagName === "SELECT" || el.type === "date") ? "change" : "input";
      el.addEventListener(evt, function(){
        var key = el.getAttribute("data-field");
        r[key] = el.value;
        save(model);
        flashSaved();
      });
    });
    document.getElementById("delRoundBtn").addEventListener("click", function(){ delRound(cid, rid); });
    document.getElementById("copyBtn").addEventListener("click", function(){ copyRound(c, r); });
    window.scrollTo(0, 0);
  }

  function fieldInput(label, key, val, type, ph) {
    return '<div class="field"><label>' + esc(label) + '</label>'
      + '<input type="' + type + '" data-field="' + key + '" value="' + esc(val) + '"'
      + (ph ? ' placeholder="' + esc(ph) + '"' : '') + '></div>';
  }
  function fieldSelect(label, key, val) {
    var opts = OUTCOMES.map(function(o){ return '<option value="' + esc(o) + '"' + (o===val?' selected':'') + '>' + esc(o) + '</option>'; }).join("");
    return '<div class="field"><label>' + esc(label) + '</label><select data-field="' + key + '">' + opts + '</select></div>';
  }
  function fieldArea(key, val, cls) {
    return '<div class="field full"><textarea class="' + (cls||'') + '" data-field="' + key + '">' + esc(val) + '</textarea></div>';
  }

  var flashTimer;
  function flashSaved() {
    var el = document.getElementById("saveInd");
    if (!el) return;
    el.classList.add("show");
    clearTimeout(flashTimer);
    flashTimer = setTimeout(function(){ el.classList.remove("show"); }, 1200);
  }

  // ---------- CRUD ----------
  function addCompany() {
    var name = prompt("Company name?");
    if (!name || !name.trim()) return;
    var role = prompt("Role / position? (optional)") || "";
    var color = AVATAR_COLORS[model.companies.length % AVATAR_COLORS.length];
    var c = { id: uid("c"), name: name.trim(), role: role.trim(), color: color, rounds: [ newRound("Round 1") ] };
    model.companies.push(c);
    save(model); render(); toast("Added " + c.name);
  }
  function editCompany(cid) {
    var c = findCompany(cid); if (!c) return;
    var name = prompt("Company name?", c.name);
    if (name === null) return;
    if (!name.trim()) { toast("Name can't be empty."); return; }
    var role = prompt("Role / position?", c.role || "");
    if (role === null) role = c.role;
    c.name = name.trim(); c.role = (role||"").trim();
    save(model); render();
  }
  function delCompany(cid) {
    var c = findCompany(cid); if (!c) return;
    if (!confirm('Delete "' + c.name + '" and all its rounds? This cannot be undone.')) return;
    model.companies = model.companies.filter(function(x){ return x.id !== cid; });
    save(model); render(); toast("Deleted " + c.name);
  }
  function addRound(cid) {
    var c = findCompany(cid); if (!c) return;
    var def = "Round " + (c.rounds.length + 1);
    var name = prompt("Round name?", def);
    if (name === null) return;
    var r = newRound(name.trim() || def);
    c.rounds.push(r);
    save(model);
    go("#/c/" + cid + "/r/" + r.id);
  }
  function delRound(cid, rid) {
    var c = findCompany(cid); if (!c) return;
    var r = findRound(c, rid); if (!r) return;
    if (!confirm('Delete "' + r.name + '"? This cannot be undone.')) return;
    c.rounds = c.rounds.filter(function(x){ return x.id !== rid; });
    save(model); go("#/"); toast("Round deleted");
  }

  function copyRound(c, r) {
    var lines = [
      c.name + " — " + r.name,
      "Role: " + (c.role || "—"),
      "Date: " + (r.date || "—") + "   Mode: " + (r.mode || "—") + "   Duration: " + (r.duration || "—"),
      "Interviewer(s): " + (r.interviewer || "—"),
      "Outcome: " + (r.outcome || "—"),
      "", "QUESTIONS ASKED:", (r.questions || "—"),
      "", "MY ANSWERS / HOW IT WENT:", (r.answers || "—"),
      "", "TOPICS TO REVISE:", (r.revise || "—"),
      "", "NOTES:", (r.notes || "—")
    ];
    var text = lines.join("\n");
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ toast("Copied to clipboard"); }, function(){ fallbackCopy(text); });
    } else fallbackCopy(text);
  }
  function fallbackCopy(text) {
    var ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta);
    ta.select(); try { document.execCommand("copy"); toast("Copied to clipboard"); } catch (e) { toast("Copy failed"); }
    document.body.removeChild(ta);
  }

  // ---------- menu ----------
  function buildMenu() {
    var menu = document.getElementById("companiesMenu");
    if (!model.companies.length) { menu.innerHTML = '<div class="menu-empty">No companies yet.</div>'; return; }
    menu.innerHTML = model.companies.map(function(c, i){
      var rounds = c.rounds.map(function(r){
        return '<a class="menu-round" href="#/c/' + c.id + '/r/' + r.id + '">'
          + '<span>' + esc(r.name) + '</span>'
          + '<span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">' + fmtDate(r.date) + '</span>'
          + '</a>';
      }).join("") || '<div class="menu-empty" style="padding:4px 10px">No rounds</div>';
      return (i>0?'<div class="menu-sep"></div>':'')
        + '<div class="menu-company"><span class="mc-name">' + esc(c.name) + (c.role?' · '+esc(c.role):'') + '</span>' + rounds + '</div>';
    }).join("");
  }
  function toggleMenu() {
    var menu = document.getElementById("companiesMenu");
    var btn = document.getElementById("companiesBtn");
    var open = menu.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
  }
  function closeMenu() {
    var menu = document.getElementById("companiesMenu");
    var btn = document.getElementById("companiesBtn");
    if (menu) menu.classList.remove("open");
    if (btn) btn.setAttribute("aria-expanded", "false");
  }
  document.getElementById("companiesBtn").addEventListener("click", function(e){ e.stopPropagation(); toggleMenu(); });
  document.getElementById("companiesMenu").addEventListener("click", function(e){ if (e.target.closest("a")) closeMenu(); });
  document.addEventListener("click", function(){ closeMenu(); });

  // ---------- export / import / theme ----------
  document.getElementById("exportBtn").addEventListener("click", function(){
    var blob = new Blob([JSON.stringify(model, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var stamp = new Date().toISOString().slice(0,10);
    a.href = url; a.download = "interview-prep-" + stamp + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url); toast("Exported backup");
  });
  document.getElementById("importBtn").addEventListener("click", function(){ document.getElementById("importFile").click(); });
  document.getElementById("importFile").addEventListener("change", function(e){
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.companies)) throw new Error("bad");
        if (!confirm("Replace all current data with this backup?")) return;
        model = data; save(model); render(); toast("Imported backup");
      } catch (err) { toast("That file isn't a valid backup."); }
    };
    reader.readAsText(file); e.target.value = "";
  });

  var themeBtn = document.getElementById("themeBtn");
  themeBtn.addEventListener("click", function(){
    var cur = document.documentElement.getAttribute("data-theme");
    var isDark = cur ? cur === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
    var next = isDark ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("iph.theme", next); } catch(e){}
  });
  try { var savedTheme = localStorage.getItem("iph.theme"); if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme); } catch(e){}

  // ---------- init ----------
  if (!location.hash) location.hash = "#/";
  render();
})();
</script>
</body>
</html>

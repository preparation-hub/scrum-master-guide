<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Interview prep hub — answered question sheets for every company and round.">
<title>Interview Prep Hub</title>
<style>
  :root {
    --paper: #eef1ef; --surface: #ffffff; --surface-2: #f6f8f6;
    --ink: #16262b; --ink-soft: #43565a; --muted: #77878a;
    --line: #dde3e0; --line-soft: #e8ece9;
    --accent: #ff5c39; --accent-ink: #c8391a;
    --teal: #0e7c7b; --teal-soft: #d8eae9;
    --amber: #c47d15; --amber-bg: #fbf1dc;
    --good: #2f8f63; --good-bg: #e3f2ea;
    --shadow: 0 1px 2px rgba(22,38,43,.06), 0 8px 24px rgba(22,38,43,.06);
    --shadow-lg: 0 2px 6px rgba(22,38,43,.08), 0 24px 60px rgba(22,38,43,.12);
    --font-display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
    --font-body: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "Consolas", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0d1416; --surface: #15201f; --surface-2: #1a2624;
      --ink: #eef3f0; --ink-soft: #bcc9c5; --muted: #839290;
      --line: #26312f; --line-soft: #202b29;
      --accent: #ff6f4d; --accent-ink: #ff8b70;
      --teal: #37b3b0; --teal-soft: #14312f;
      --amber: #e6b45c; --amber-bg: #2a2416;
      --good: #4bbd83; --good-bg: #14281f;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
      --shadow-lg: 0 2px 6px rgba(0,0,0,.5), 0 24px 60px rgba(0,0,0,.5);
    }
  }
  :root[data-theme="dark"] {
    --paper: #0d1416; --surface: #15201f; --surface-2: #1a2624;
    --ink: #eef3f0; --ink-soft: #bcc9c5; --muted: #839290;
    --line: #26312f; --line-soft: #202b29;
    --accent: #ff6f4d; --accent-ink: #ff8b70;
    --teal: #37b3b0; --teal-soft: #14312f;
    --amber: #e6b45c; --amber-bg: #2a2416;
    --good: #4bbd83; --good-bg: #14281f;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    --shadow-lg: 0 2px 6px rgba(0,0,0,.5), 0 24px 60px rgba(0,0,0,.5);
  }
  :root[data-theme="light"] {
    --paper: #eef1ef; --surface: #ffffff; --surface-2: #f6f8f6;
    --ink: #16262b; --ink-soft: #43565a; --muted: #77878a;
    --line: #dde3e0; --line-soft: #e8ece9;
    --accent: #ff5c39; --accent-ink: #c8391a;
    --teal: #0e7c7b; --teal-soft: #d8eae9;
    --amber: #c47d15; --amber-bg: #fbf1dc;
    --good: #2f8f63; --good-bg: #e3f2ea;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--font-body); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  a { color: var(--accent-ink); }

  .topbar { position: sticky; top: 0; z-index: 100; background: color-mix(in srgb, var(--paper) 88%, transparent); backdrop-filter: saturate(1.4) blur(10px); border-bottom: 1px solid var(--line); }
  .topbar-inner { max-width: 1120px; margin: 0 auto; padding: 11px 22px; display: flex; align-items: center; gap: 14px; }
  .brand { font-family: var(--font-display); font-weight: 600; font-size: 19px; letter-spacing: -0.01em; text-decoration: none; color: var(--ink); display: flex; align-items: center; gap: 9px; white-space: nowrap; }
  .brand .dot { width: 11px; height: 11px; border-radius: 3px; background: var(--accent); transform: rotate(45deg); }
  .spacer { flex: 1; }
  .nav-actions { display: flex; align-items: center; gap: 8px; }
  .btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 550; color: var(--ink); background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 7px 12px; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: background .15s, border-color .15s; }
  .btn:hover { background: var(--surface-2); border-color: var(--muted); }
  .btn-sm { font-size: 12.5px; padding: 5px 9px; border-radius: 8px; }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-2); }
  .icon { width: 15px; height: 15px; display: inline-block; vertical-align: -2px; }

  .dropdown { position: relative; }
  .menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 280px; background: var(--surface); border: 1px solid var(--line); border-radius: 13px; box-shadow: var(--shadow-lg); padding: 8px; display: none; z-index: 200; max-height: 72vh; overflow-y: auto; }
  .menu.open { display: block; }
  .menu-company { padding: 8px 10px 4px; }
  .menu-company .mc-name { font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 3px; }
  .menu a.menu-round, .menu span.menu-round { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 7px 10px; border-radius: 8px; text-decoration: none; color: var(--ink); font-size: 13.5px; }
  .menu a.menu-round:hover { background: var(--surface-2); }
  .menu span.menu-round { color: var(--muted); }
  .menu-sep { height: 1px; background: var(--line-soft); margin: 6px 4px; }

  main { max-width: 1120px; margin: 0 auto; padding: 34px 22px 90px; }
  .page-head { margin-bottom: 8px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent-ink); margin: 0 0 10px; }
  h1.title { font-family: var(--font-display); font-weight: 600; font-size: clamp(30px, 5vw, 46px); line-height: 1.06; letter-spacing: -0.015em; margin: 0 0 12px; text-wrap: balance; }
  .subtitle { color: var(--ink-soft); margin: 0; max-width: 62ch; }

  .stats { display: flex; flex-wrap: wrap; gap: 12px; margin: 24px 0 8px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 13px; padding: 13px 18px; box-shadow: var(--shadow); min-width: 130px; }
  .stat .n { font-family: var(--font-display); font-size: 26px; font-weight: 600; line-height: 1; }
  .stat .l { font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

  .section-bar { display: flex; align-items: center; gap: 12px; margin: 34px 0 16px; }
  .section-bar h2 { font-family: var(--font-display); font-weight: 600; font-size: 21px; margin: 0; }
  .section-bar .line { flex: 1; height: 1px; background: var(--line); }
  .legend { font-family: var(--font-mono); font-size: 11px; color: var(--muted); display: flex; gap: 14px; }
  .legend .dotp { display: inline-block; width: 8px; height: 8px; border-radius: 999px; margin-right: 5px; vertical-align: 1px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; }
  .card-top { padding: 18px 18px 14px; }
  .card-head { display: flex; align-items: flex-start; gap: 12px; }
  .avatar { flex: none; width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; font-family: var(--font-display); font-weight: 600; font-size: 18px; color: #fff; }
  .card h3 { font-family: var(--font-display); font-weight: 600; font-size: 20px; margin: 0; line-height: 1.15; letter-spacing: -0.01em; word-break: break-word; }
  .card .role { color: var(--ink-soft); font-size: 13.5px; margin-top: 2px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 13px; font-size: 12.5px; color: var(--muted); font-family: var(--font-mono); }
  .card-meta b { color: var(--ink); font-weight: 600; }

  .rounds { border-top: 1px solid var(--line-soft); padding: 8px 12px 12px; margin-top: 2px; }
  .round-row { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 9px; text-decoration: none; color: var(--ink); }
  a.round-row:hover { background: var(--surface-2); }
  a.round-row { border: 1px solid transparent; }
  a.round-row:hover { border-color: var(--line); }
  .round-row.soon { color: var(--muted); cursor: default; }
  .rr-name { font-weight: 550; font-size: 14.5px; display: flex; align-items: center; gap: 7px; }
  .rr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .arrow { color: var(--accent); font-weight: 700; }

  .pill { font-family: var(--font-mono); font-size: 10px; letter-spacing: .05em; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; font-weight: 600; white-space: nowrap; border: 1px solid transparent; }
  .pill.ready { background: var(--good-bg); color: var(--good); }
  .pill.soon { background: var(--surface-2); color: var(--muted); border-color: var(--line); }

  footer { border-top: 1px solid var(--line); background: var(--surface); }
  .footer-inner { max-width: 1120px; margin: 0 auto; padding: 30px 22px 60px; color: var(--muted); font-size: 14px; }
  .footer-inner a { color: var(--accent-ink); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
  @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; transition: none !important; } }
  @media (max-width: 560px) { .brand span.brand-text { display: none; } .nav-actions .label { display: none; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html"><span class="dot"></span><span class="brand-text">Interview Prep Hub</span></a>
    <div class="spacer"></div>
    <div class="nav-actions">
      <div class="dropdown">
        <button class="btn" id="companiesBtn" aria-haspopup="true" aria-expanded="false">
          Companies
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="menu" id="companiesMenu" role="menu"></div>
      </div>
      <a class="btn" href="scrum-guide.html">📘 <span class="label">Scrum Guide</span></a>
      <button class="btn btn-ghost btn-sm" id="themeBtn" title="Toggle light / dark">◐</button>
    </div>
  </div>
</header>

<main id="app"></main>

<footer>
  <div class="footer-inner">
    Personal interview-prep hub · curated answer sheets for the Scrum Master role. Company &amp; round structure is fixed; each "Ready" round opens a full answered guide with diagrams. · <a href="scrum-guide.html">General Scrum guide →</a>
  </div>
</footer>

<script>
(function () {
  "use strict";
  var COLORS = ["#0e7c7b","#ff5c39","#c47d15","#2f8f63","#5b5bd6","#b3357e","#2b7fb3","#8a6d1f","#317d5c","#a4453b","#6a4fb3","#207a8c"];

  // ===== CURATED STRUCTURE (edit here to add companies / rounds / guides) =====
  var COMPANIES = [
    { name: "EY",                 role: "SAFe Scrum Master", rounds: [ { name: "Round 1 (L1)", guide: "ey-round-1.html" } ] },
    { name: "Zemoso Technologies",role: "Scrum Master",      rounds: [ { name: "L1 Round" }, { name: "Labs — L1" }, { name: "Labs — L3" } ] },
    { name: "Spekond",            role: "Scrum Master",      rounds: [ { name: "Client Interview" }, { name: "Delivery & Release Round" } ] },
    { name: "Tech Mahindra",      role: "Scrum Master",      rounds: [ { name: "Interview" } ] },
    { name: "Blue Cloud",         role: "Scrum Master",      rounds: [ { name: "L3 (30 min)" } ] },
    { name: "Teksystems",         role: "SM · Client: HSBC", rounds: [ { name: "L1 Interview" } ] },
    { name: "Crisil",             role: "Scrum Master",      rounds: [ { name: "L2" }, { name: "L3 (Sr Director)" } ] },
    { name: "LTIMindtree",        role: "Scrum Master",      rounds: [ { name: "L1" } ] },
    { name: "Ralph Lauren",       role: "Scrum Master",      rounds: [ { name: "L2" }, { name: "L3" } ] },
    { name: "Deloitte",           role: "SAFe Scrum Master", rounds: [ { name: "R1 (30 min)" } ] },
    { name: "HTC Global",         role: "Agile Coach",       rounds: [ { name: "L1 (30 min)" } ] },
    { name: "BCE Global Tech",    role: "SM · Han Digital",  rounds: [ { name: "Interview" } ] },
    { name: "Alten",              role: "Scrum Master",      rounds: [ { name: "L1" } ] }
  ];
  // ============================================================================

  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  function initials(name){ var p=String(name||"?").trim().split(/\s+/).filter(Boolean); if(!p.length)return"?"; if(p.length===1)return p[0].slice(0,2).toUpperCase(); return (p[0][0]+p[1][0]).toUpperCase(); }
  COMPANIES.forEach(function(c,i){ c.color = COLORS[i % COLORS.length]; });

  function render() {
    var app = document.getElementById("app");
    var totalRounds = 0, ready = 0;
    COMPANIES.forEach(function(c){ totalRounds += c.rounds.length; c.rounds.forEach(function(r){ if(r.guide) ready++; }); });

    var html = ''
      + '<div class="page-head">'
      +   '<p class="eyebrow">Scrum Master · Interview Answer Sheets</p>'
      +   '<h1 class="title">Interview Prep Hub</h1>'
      +   '<p class="subtitle">Every company and round I\'ve prepared, each opening a full answered guide — real questions, in-depth answers, and diagrams to understand fast. "Coming soon" rounds are queued to be written.</p>'
      + '</div>'
      + '<div class="stats">'
      +   stat(COMPANIES.length, "Companies")
      +   stat(totalRounds, "Rounds")
      +   stat(ready, "Answer sheets ready")
      + '</div>'
      + '<div class="section-bar"><h2>Companies</h2><div class="line"></div>'
      +   '<span class="legend"><span><span class="dotp" style="background:var(--good)"></span>Ready</span><span><span class="dotp" style="background:var(--muted)"></span>Coming soon</span></span>'
      + '</div>'
      + '<div class="grid">' + COMPANIES.map(cardHTML).join("") + '</div>';
    app.innerHTML = html;
  }
  function stat(n,l){ return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+esc(l)+'</div></div>'; }

  function roundRow(c, r) {
    if (r.guide) {
      return '<a class="round-row" href="'+esc(r.guide)+'">'
        + '<span class="rr-name">📖 '+esc(r.name)+'</span>'
        + '<span class="rr-right"><span class="pill ready">Ready</span><span class="arrow">→</span></span>'
        + '</a>';
    }
    return '<span class="round-row soon">'
      + '<span class="rr-name">'+esc(r.name)+'</span>'
      + '<span class="rr-right"><span class="pill soon">Soon</span></span>'
      + '</span>';
  }

  function cardHTML(c) {
    var readyCount = c.rounds.filter(function(r){return r.guide;}).length;
    return ''
      + '<div class="card">'
      +   '<div class="card-top">'
      +     '<div class="card-head">'
      +       '<div class="avatar" style="background:'+esc(c.color)+'">'+esc(initials(c.name))+'</div>'
      +       '<div style="min-width:0"><h3>'+esc(c.name)+'</h3><div class="role">'+esc(c.role||"")+'</div></div>'
      +     '</div>'
      +     '<div class="card-meta">'
      +       '<span><b>'+c.rounds.length+'</b> round'+(c.rounds.length===1?'':'s')+'</span>'
      +       '<span><b>'+readyCount+'</b> ready</span>'
      +     '</div>'
      +   '</div>'
      +   '<div class="rounds">' + c.rounds.map(function(r){ return roundRow(c,r); }).join("") + '</div>'
      + '</div>';
  }

  // dropdown menu
  function buildMenu() {
    var menu = document.getElementById("companiesMenu");
    menu.innerHTML = COMPANIES.map(function(c,i){
      var rounds = c.rounds.map(function(r){
        if (r.guide) return '<a class="menu-round" href="'+esc(r.guide)+'"><span>📖 '+esc(r.name)+'</span><span class="pill ready">Ready</span></a>';
        return '<span class="menu-round"><span>'+esc(r.name)+'</span><span class="pill soon">Soon</span></span>';
      }).join("");
      return (i>0?'<div class="menu-sep"></div>':'')+'<div class="menu-company"><span class="mc-name">'+esc(c.name)+'</span>'+rounds+'</div>';
    }).join("");
  }
  var btn = document.getElementById("companiesBtn"), menu = document.getElementById("companiesMenu");
  function closeMenu(){ menu.classList.remove("open"); btn.setAttribute("aria-expanded","false"); }
  btn.addEventListener("click", function(e){ e.stopPropagation(); var o=menu.classList.toggle("open"); btn.setAttribute("aria-expanded", o?"true":"false"); });
  menu.addEventListener("click", function(e){ if(e.target.closest("a")) closeMenu(); });
  document.addEventListener("click", closeMenu);

  // theme
  var themeBtn = document.getElementById("themeBtn");
  themeBtn.addEventListener("click", function(){
    var cur = document.documentElement.getAttribute("data-theme");
    var isDark = cur ? cur==="dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
    var next = isDark ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("iph.theme", next); } catch(e){}
  });
  try { var t = localStorage.getItem("iph.theme"); if(t) document.documentElement.setAttribute("data-theme", t); } catch(e){}

  buildMenu();
  render();
})();
</script>
</body>
</html>
